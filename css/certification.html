<!-- Modal Sertifikat -->
<div
  class="modal fade"
  id="certModal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="certModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="certModalLabel">My Certifications</h5>
        <button
          type="button"
          class="close"
          data-dismiss="modal"
          aria-label="Close"
        >
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="row">
          <!-- Sertifikat 1 -->
          <div class="col-md-6 text-center mb-4">
            <img
              src="images/cert1.jpg"
              alt="Sertifikat 1"
              class="img-fluid mb-2 rounded"
              style="max-height: 200px"
            />
            <p>Dicoding Front-End Developer</p>
          </div>
          <!-- Sertifikat 2 -->
          <div class="col-md-6 text-center mb-4">
            <img
              src="images/cert2.jpg"
              alt="Sertifikat 2"
              class="img-fluid mb-2 rounded"
              style="max-height: 200px"
            />
            <p>Google UX Design</p>
          </div>
          <!-- Tambah sesuai kebutuhan -->
        </div>
      </div>
    </div>
  </div>
</div>
